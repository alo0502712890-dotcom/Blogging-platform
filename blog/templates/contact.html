{% extends 'base.html' %}

{% block content %}

<section class="py-5">

  <div class="container">

    <div class="text-center mb-5">

      <h1 class="fw-bold">
        Contact Us
      </h1>

      <p class="text-muted">

        We'd love to hear from you.

      </p>

    </div>





    <div class="row">

      <div class="col-lg-5">

        <div class="card border-0 shadow-sm rounded-4 h-100">

          <div class="card-body p-4">

            <h4 class="fw-bold mb-4">

              Contact Information

            </h4>

            <p>
              📧 blogy@example.com
            </p>

            <p>
              📞 +380 99 123 45 67
            </p>

            <p>
              📍 Ukraine
            </p>

          </div>

        </div>

      </div>





      <div class="col-lg-7">

        <div class="card border-0 shadow-sm rounded-4">

          <div class="card-body p-4">

            <form>

              <div class="mb-3">

                <input
                  type="text"
                  class="form-control"
                  placeholder="Your Name"
                >

              </div>





              <div class="mb-3">

                <input
                  type="email"
                  class="form-control"
                  placeholder="Your Email"
                >

              </div>





              <div class="mb-3">

                <textarea
                  class="form-control"
                  rows="6"
                  placeholder="Message"
                ></textarea>

              </div>





              <button
                class="btn btn-primary"
                type="submit"
              >
                Send Message
              </button>

            </form>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>

{% endblock %}

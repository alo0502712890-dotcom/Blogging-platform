{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">

  <meta
    content="width=device-width, initial-scale=1.0"
    name="viewport"
  >

  <title>Blog Platform</title>

  <!-- Bootstrap -->
  <link
    href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    href="{% static 'vendor/bootstrap-icons/bootstrap-icons.css' %}"
    rel="stylesheet"
  >

  <!-- AOS -->
  <link
    href="{% static 'vendor/aos/aos.css' %}"
    rel="stylesheet"
  >

  <!-- Swiper -->
  <link
    href="{% static 'vendor/swiper/swiper-bundle.min.css' %}"
    rel="stylesheet"
  >

  <!-- GLightbox -->
  <link
    href="{% static 'vendor/glightbox/css/glightbox.min.css' %}"
    rel="stylesheet"
  >

  <!-- Main CSS -->
  <link
    href="{% static 'css/main.css' %}"
    rel="stylesheet"
  >

</head>

<body>





<!-- TOP HEADER -->

<header id="header" class="header position-relative">

  <div class="top-bar py-3 border-bottom bg-white">

    <div class="container d-flex justify-content-between align-items-center">

      <!-- LOGO -->

      <a
        href="/"
        class="logo d-flex align-items-center text-decoration-none"
      >

        <h1 class="sitename m-0">
          Blog Platform
        </h1>

      </a>





      <!-- RIGHT SIDE -->

      <div class="d-flex align-items-center gap-3">

        <!-- SOCIALS -->

        <a href="#" class="text-dark">
          <i class="bi bi-facebook"></i>
        </a>

        <a href="#" class="text-dark">
          <i class="bi bi-twitter"></i>
        </a>

        <a href="#" class="text-dark">
          <i class="bi bi-instagram"></i>
        </a>





        <!-- SEARCH -->

        <form class="d-flex">

          <input
            class="form-control"
            type="search"
            placeholder="Search..."
          >

        </form>





        <!-- BUTTON -->

        <a
          href="/create"
          class="btn btn-primary"
        >
          Create Post
        </a>

      </div>

    </div>

  </div>

</header>





<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg bg-white border-bottom">

  <div class="container">

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >

      <span class="navbar-toggler-icon"></span>

    </button>





    <div
      class="collapse navbar-collapse justify-content-center"
      id="navbarNav"
    >

      <ul class="navbar-nav gap-4">

        <li class="nav-item">

          <a
            class="nav-link active"
            href="/"
          >
            Home
          </a>

        </li>





        <li class="nav-item">

          <a
            class="nav-link"
            href="#"
          >
            About
          </a>

        </li>





        <li class="nav-item">

          <a
            class="nav-link"
            href="#"
          >
            Category
          </a>

        </li>





        <li class="nav-item">

          <a
            class="nav-link"
            href="#"
          >
            Blog Details
          </a>

        </li>





        <li class="nav-item">

          <a
            class="nav-link"
            href="#"
          >
            Author Profile
          </a>

        </li>





        <li class="nav-item">

          <a
            class="nav-link"
            href="#"
          >
            Pages
          </a>

        </li>





        <li class="nav-item">

          <a
            class="nav-link"
            href="#"
          >
            Contact
          </a>

        </li>

      </ul>

    </div>

  </div>

</nav>





<!-- MAIN -->

<main class="main">

  {% block content %}
  {% endblock %}

</main>





<!-- Bootstrap -->
<script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>

<!-- AOS -->
<script src="{% static 'vendor/aos/aos.js' %}"></script>

<!-- Swiper -->
<script src="{% static 'vendor/swiper/swiper-bundle.min.js' %}"></script>

<!-- Purecounter -->
<script src="{% static 'vendor/purecounter/purecounter_vanilla.js' %}"></script>

<!-- GLightbox -->
<script src="{% static 'vendor/glightbox/js/glightbox.min.js' %}"></script>

</body>

</html>

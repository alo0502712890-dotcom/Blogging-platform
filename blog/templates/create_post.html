{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

  <div class="col-lg-8">

    <div class="card shadow-sm border-0">

      <div class="card-body p-4">

        <h2 class="mb-4 fw-bold">
          Create Article
        </h2>

        <form method="POST">

          {% csrf_token %}

          {{ form.as_p }}

          <button class="btn btn-success">
            Publish
          </button>

        </form>

      </div>

    </div>

  </div>

</div>

{% endblock %}

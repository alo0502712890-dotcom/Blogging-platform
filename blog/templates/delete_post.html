{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

  <div class="col-lg-8">

    <div class="card shadow-sm border-0">

      <div class="card-body p-4 text-center">

        <h2 class="mb-4 fw-bold">
          Delete Article
        </h2>

        <p class="fs-5">

          Are you sure you want to delete:

          <strong>
            "{{ post.title }}"
          </strong>

          ?

        </p>

        <form method="POST">

          {% csrf_token %}

          <button
            type="submit"
            class="btn btn-danger"
          >
            Delete
          </button>

          <a
            href="{% url 'profile' %}"
            class="btn btn-secondary"
          >
            Cancel
          </a>

        </form>

      </div>

    </div>

  </div>

</div>

{% endblock %}

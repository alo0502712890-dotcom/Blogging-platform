{% extends "base.html" %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        Вхід
                    </h2>
                    <form method="post">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Ім'я користувача
                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control"
                            >
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Пароль
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                            >
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100"
                        >
                            Увійти
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
